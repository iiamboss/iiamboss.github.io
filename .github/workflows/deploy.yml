# Astro 사이트를 빌드해 GitHub Pages 에 올린다.
#
# 브랜치 빌드(Deploy from a branch)를 쓰지 않는 이유: 그 경로는 Jekyll 3.10 에
# 묶여 있어 Astro 를 아예 못 돌린다. Pages 설정에서 Source 를 "GitHub Actions"
# 로 바꿔야 이 워크플로가 배포된다.
name: Deploy

on:
  push:
    branches: [master]
  # 수동 실행도 열어둔다
  workflow_dispatch:

# Pages 배포에 필요한 최소 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 배포는 한 번에 하나만. 밀린 실행은 최신 것만 남긴다.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
